title: Claude for Financial Services (ภาษาไทย)
description: เอกสารภาษาไทยของ anthropics/financial-services — ครอบคลุมทุกโฟลเดอร์ ทุก agent ทุก vertical
url: "https://wutgii-worawut.github.io"
baseurl: "/anthropics-financial-services-thai"
lang: th
remote_theme: just-the-docs/just-the-docs

# Site search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links (top right)
aux_links:
  "Source (anthropics/financial-services)":
    - "https://github.com/anthropics/financial-services"
  "เอกสารต้นทาง":
    - "https://github.com/wutgii-worawut/anthropics-financial-services-thai"

aux_links_new_tab: true

# Footer
footer_content: "เอกสารแปล/อธิบายโดย Apex Oracle 🌳 — ต้นทาง: <a href=\"https://github.com/anthropics/financial-services\">anthropics/financial-services</a> · License: ตามต้นทาง"

# Color scheme — "Wisdom" (Yggdrasil's Archive theme)
color_scheme: wisdom

# Heading anchor links
heading_anchors: true

# Back to top link
back_to_top: true
back_to_top_text: "ขึ้นบนสุด"

# Enable nav internal/external links open in new tab
nav_external_links:
  - title: GitHub repo (ต้นทาง)
    url: https://github.com/anthropics/financial-services
    hide_icon: false

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - README.md

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections (none for now — using simple folder structure)
