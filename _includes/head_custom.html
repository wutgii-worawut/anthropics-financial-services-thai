<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    if (typeof mermaid !== "undefined") {
      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        themeVariables: {
          primaryColor: "#fbf8ec",
          primaryTextColor: "#0d0d0d",
          primaryBorderColor: "#a8861e",
          lineColor: "#8e6a14",
          secondaryColor: "#f0e3b4",
          tertiaryColor: "#faf6ec",
          fontFamily: "'Cormorant Garamond', 'Sarabun', serif"
        }
      });
      document.querySelectorAll('pre code.language-mermaid, code.language-mermaid').forEach(function(el) {
        var pre = el.closest('pre');
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        if (pre) { pre.replaceWith(div); }
        else { el.replaceWith(div); }
      });
      mermaid.run();
    }
  });
</script>

<!-- Three.js: Gold particles drifting like coins in slow motion -->
<script type="module">
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    import('three').then(THREE => {
      const canvas = document.createElement('canvas');
      canvas.id = 'bg-canvas';
      document.body.insertBefore(canvas, document.body.firstChild);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0xfaf6ec, 0.035);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.z = 14;

      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      // Lights — moody, single key + warm fill
      const ambient = new THREE.AmbientLight(0xfaf6ec, 0.85);
      scene.add(ambient);
      const key = new THREE.PointLight(0xa8861e, 1.4, 30);
      key.position.set(6, 4, 6);
      scene.add(key);
      const fill = new THREE.PointLight(0xc4a345, 0.45, 25);
      fill.position.set(-8, -3, 4);
      scene.add(fill);

      // Gold particles — small octahedrons, mix of sizes
      const particles = [];
      const goldMat = new THREE.MeshStandardMaterial({
        color: 0xa8861e,
        emissive: 0x8e6a14,
        emissiveIntensity: 0.35,
        metalness: 0.7,
        roughness: 0.3,
      });

      const N = 60;
      for (let i = 0; i < N; i++) {
        const size = 0.05 + Math.random() * 0.18;
        const geom = Math.random() < 0.5
          ? new THREE.OctahedronGeometry(size, 0)
          : new THREE.TetrahedronGeometry(size, 0);
        const p = new THREE.Mesh(geom, goldMat);
        p.position.set(
          (Math.random() - 0.5) * 24,
          (Math.random() - 0.5) * 18,
          (Math.random() - 0.5) * 10 - 2
        );
        p.rotation.set(
          Math.random() * Math.PI * 2,
          Math.random() * Math.PI * 2,
          0
        );
        p.userData = {
          driftX: (Math.random() - 0.5) * 0.003,
          driftY: 0.001 + Math.random() * 0.003, // floating UP
          rotSpeedX: (Math.random() - 0.5) * 0.005,
          rotSpeedY: (Math.random() - 0.5) * 0.007,
        };
        scene.add(p);
        particles.push(p);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener('resize', onResize);

      let running = true;
      document.addEventListener('visibilitychange', () => {
        running = !document.hidden;
        if (running) animate();
      });

      function animate() {
        if (!running) return;
        requestAnimationFrame(animate);
        particles.forEach(p => {
          p.position.x += p.userData.driftX;
          p.position.y += p.userData.driftY;
          p.rotation.x += p.userData.rotSpeedX;
          p.rotation.y += p.userData.rotSpeedY;
          // Wrap: when above frame, reset to below
          if (p.position.y > 10) {
            p.position.y = -10;
            p.position.x = (Math.random() - 0.5) * 24;
          }
          if (p.position.x > 14) p.position.x = -14;
          if (p.position.x < -14) p.position.x = 14;
        });
        renderer.render(scene, camera);
      }
      animate();
    }).catch(err => console.warn('Three.js scene failed:', err));
  }
</script>
